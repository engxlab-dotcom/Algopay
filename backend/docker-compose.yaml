services:
  postgres:
    image: postgres:16
    container_name: algostack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: algostack
      POSTGRES_PASSWORD: algostack_secret
      POSTGRES_DB: algostack
    ports:
      - "5432:5432"
    volumes:
      - algostack_pgdata:/var/lib/postgresql/data

volumes:
  algostack_pgdata: